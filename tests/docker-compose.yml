services:
  cmr_toolkit:
    container_name: devtest_cmr_toolkit
    build:
      context: .
      dockerfile: tests/Dockerfile
    shm_size: 64G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 220G
          cpus: '32'
        reservations:
          memory: 160G
          cpus: '24'
    volumes:
      - .:/app
      - ${RAW_DICOM_PATH}:/app/cmr_toolkit_raw_dicoms
      - ${TMP_DIR}:/app/tmp_dir

    environment:
      - PYTHONUNBUFFERED=1 #Buffer of python stdout printed in terminal
      - DEVICE_NAME=docker
    command: |
       sh -c "
       cleanup() {
          echo 'Cleaning up…';
          rm -rf /app/tmp_dir/preprocessed_outputs || true;
          rm -rf /app/tmp_dir/preprocessed_outputs_greyscale || true;
       }
       trap cleanup EXIT;

       cd /app/utils &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/stanford' -o '/app/tmp_dir/preprocessed_outputs' -c ${NUM_CPUS} -i 'stanford' &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/ucsf' -o '/app/tmp_dir/preprocessed_outputs' -c ${NUM_CPUS} -i 'ucsf' &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/medstar' -o '/app/tmp_dir/preprocessed_outputs' -c ${NUM_CPUS} -i 'medstar' &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/ukbiobank' -o '/app/tmp_dir/preprocessed_outputs' -c ${NUM_CPUS} -i 'ukbiobank' &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/upenn' -o '/app/tmp_dir/preprocessed_outputs' -c ${NUM_CPUS} -i 'upenn' &&  
       python generate_checksums.py -i '/app/tmp_dir/preprocessed_outputs' -o 'generated_checksums.csv' -c ${NUM_CPUS} -f '/app/tests/checksums/mar31_2026_checksum_manifest_rgb.csv' &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/stanford' -o '/app/tmp_dir/preprocessed_outputs_greyscale' -c ${NUM_CPUS} -i 'stanford' --channels='grey' &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/ucsf' -o '/app/tmp_dir/preprocessed_outputs_greyscale' -c ${NUM_CPUS} -i 'ucsf' --channels='grey' &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/medstar' -o '/app/tmp_dir/preprocessed_outputs_greyscale' -c ${NUM_CPUS} -i 'medstar' --channels='grey' &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/ukbiobank' -o '/app/tmp_dir/preprocessed_outputs_greyscale' -c ${NUM_CPUS} -i 'ukbiobank' --channels='grey' &&
       python preprocess_mri.py -r '/app/cmr_toolkit_raw_dicoms/upenn' -o '/app/tmp_dir/preprocessed_outputs_greyscale' -c ${NUM_CPUS} -i 'upenn' --channels='grey' &&  
       python generate_checksums.py -i '/app/tmp_dir/preprocessed_outputs_greyscale' -o 'greyscale_generated_checksums.csv' -c ${NUM_CPUS} -f '/app/tests/checksums/mar31_2026_checksum_manifest_grey.csv'
       "
